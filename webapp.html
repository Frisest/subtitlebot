<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Настройки субтитров</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2e2e2e;
  --accent: #4f9eff;
  --text: #f0f0f0;
  --text2: #888;
  --radius: 12px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Segoe UI', sans-serif;
  font-size: 15px;
  padding: 12px 12px 100px;
}

/* РАЗМЕР ВИДЕО */
.size-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
}
.size-row label {
  font-size: 12px;
  color: var(--text2);
  white-space: nowrap;
}
.size-row input[type=number] {
  width: 72px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  padding: 7px 10px;
  outline: none;
  -moz-appearance: textfield;
}
.size-row input[type=number]::-webkit-outer-spin-button,
.size-row input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
.size-row input[type=number]:focus { border-color: var(--accent); }
.size-sep { color: var(--text2); font-size: 18px; }
.size-hint { font-size: 11px; color: var(--text2); margin-left: auto; }

/* PREVIEW */
.preview-wrap {
  position: relative;
  background: #111;
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 14px;
  width: 100%;
}
.preview-bg {
  width: 100%;
  height: 100%;
  background: linear-gradient(160deg, #1a1a2e, #0f3460);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #333;
  font-size: 12px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  position: absolute;
  top: 0; left: 0;
}
.preview-inner {
  position: relative;
  width: 100%;
}

#safe-zone {
  position: absolute;
  border: 1.5px dashed rgba(79,158,255,0.5);
  border-radius: 4px;
  background: rgba(79,158,255,0.04);
  pointer-events: none;
}

#sub-preview {
  position: absolute;
  left: 0; right: 0;
  text-align: center;
  pointer-events: none;
  padding: 0 8px;
}
#sub-text {
  display: inline-block;
  color: #fff;
  text-shadow: 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
  line-height: 1.3;
}

.handle {
  position: absolute;
  width: 12px;
  height: 12px;
  background: var(--accent);
  border: 2px solid #fff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  touch-action: none;
  cursor: grab;
}

/* SECTIONS */
.section {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text2);
  padding: 10px 14px 6px;
}
.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  gap: 12px;
}
.row:first-of-type { border-top: none; }
.row-label { font-size: 14px; color: var(--text); flex-shrink: 0; min-width: 100px; }
.row-value { font-size: 13px; color: var(--accent); font-weight: 600; min-width: 36px; text-align: right; flex-shrink: 0; }

/* SLIDERS */
input[type=range] {
  -webkit-appearance: none;
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--accent);
  border: 3px solid var(--surface);
  box-shadow: 0 0 0 2px var(--accent);
}

/* TOGGLE */
.toggle-wrap {
  display: flex;
  background: var(--surface2);
  border-radius: 8px;
  padding: 3px;
  gap: 0;
  flex-shrink: 0;
}
.toggle-wrap button {
  border: none;
  background: none;
  color: var(--text2);
  font-size: 12px;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.toggle-wrap button.active { background: var(--accent); color: #fff; }

/* COLOR */
.color-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
}
.color-swatch {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: transform 0.15s;
}
.color-swatch:hover { transform: scale(1.1); }
.color-swatch.selected { border-color: #fff; }

/* POS GRID */
.pos-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
}
.pos-btn {
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  border-radius: 8px;
  padding: 8px 4px;
  font-size: 11px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.pos-btn .icon { font-size: 16px; display: block; margin-bottom: 2px; }
.pos-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

/* BOTTOM */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 10px 12px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  z-index: 100;
}
.btn-reset {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  color: var(--text2);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
}
.btn-save {
  flex: 1;
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 10px;
  padding: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- РАЗМЕР ВИДЕО -->
<div class="size-row">
  <label>Ширина</label>
  <input type="number" id="vidW" value="1080" min="100" max="7680" placeholder="1080">
  <span class="size-sep">×</span>
  <label>Высота</label>
  <input type="number" id="vidH" value="1920" min="100" max="7680" placeholder="1920">
  <span class="size-hint">px (формат видео)</span>
</div>

<!-- PREVIEW -->
<div class="preview-wrap" id="previewWrap">
  <div class="preview-inner" id="previewInner">
    <div class="preview-bg">Превью</div>
    <div id="safe-zone">
      <div class="handle" id="h-tl"></div>
      <div class="handle" id="h-tr"></div>
      <div class="handle" id="h-bl"></div>
      <div class="handle" id="h-br"></div>
    </div>
    <div id="sub-preview">
      <span id="sub-text">Пример субтитра здесь</span>
    </div>
  </div>
</div>

<!-- ПОЗИЦИЯ -->
<div class="section">
  <div class="section-title">Позиция</div>
  <div class="pos-grid">
    <button class="pos-btn" id="pb-tl" onclick="setPreset('tl')"><span class="icon">↖</span>Верх лево</button>
    <button class="pos-btn" id="pb-tc" onclick="setPreset('tc')"><span class="icon">↑</span>Верх центр</button>
    <button class="pos-btn" id="pb-tr" onclick="setPreset('tr')"><span class="icon">↗</span>Верх право</button>
    <button class="pos-btn" id="pb-ml" onclick="setPreset('ml')"><span class="icon">←</span>Середина</button>
    <button class="pos-btn" id="pb-mc" onclick="setPreset('mc')"><span class="icon">·</span>Центр</button>
    <button class="pos-btn" id="pb-mr" onclick="setPreset('mr')"><span class="icon">→</span>Середина</button>
    <button class="pos-btn" id="pb-bl" onclick="setPreset('bl')"><span class="icon">↙</span>Низ лево</button>
    <button class="pos-btn active" id="pb-bc" onclick="setPreset('bc')"><span class="icon">↓</span>Низ центр</button>
    <button class="pos-btn" id="pb-br" onclick="setPreset('br')"><span class="icon">↘</span>Низ право</button>
  </div>
</div>

<!-- РАЗМЕР И СТИЛЬ -->
<div class="section">
  <div class="section-title">Размер и стиль</div>
  <div class="row">
    <span class="row-label">Размер шрифта</span>
    <input type="range" id="fontSize" min="14" max="52" value="22" oninput="onFontSize()">
    <span class="row-value" id="fontSizeVal">22px</span>
  </div>
  <div class="row">
    <span class="row-label">Жирность</span>
    <div class="toggle-wrap">
      <button id="fw-normal" class="active" onclick="setFW('normal')">Обычный</button>
      <button id="fw-bold" onclick="setFW('bold')">Жирный</button>
    </div>
  </div>
  <div class="row">
    <span class="row-label">Фон текста</span>
    <div class="toggle-wrap">
      <button id="bg-none" class="active" onclick="setBG('none')">Нет</button>
      <button id="bg-shadow" onclick="setBG('shadow')">Тень</button>
      <button id="bg-box" onclick="setBG('box')">Плашка</button>
    </div>
  </div>
  <div class="row">
    <span class="row-label">Слов в строке</span>
    <input type="range" id="maxWords" min="2" max="8" value="5" step="1" oninput="onMaxWords()">
    <span class="row-value" id="maxWordsVal">5</span>
  </div>
</div>

<!-- ЦВЕТ -->
<div class="section">
  <div class="section-title">Цвет текста</div>
  <div class="color-row" id="colorRow"></div>
</div>

<!-- ОТСТУПЫ ЗОНЫ -->
<div class="section">
  <div class="section-title">Безопасная зона (отступы от краёв)</div>
  <div class="row">
    <span class="row-label">Слева</span>
    <input type="range" id="zL" min="0" max="40" value="5" oninput="onZone()">
    <span class="row-value" id="zLv">5%</span>
  </div>
  <div class="row">
    <span class="row-label">Справа</span>
    <input type="range" id="zR" min="0" max="40" value="5" oninput="onZone()">
    <span class="row-value" id="zRv">5%</span>
  </div>
  <div class="row">
    <span class="row-label">Сверху</span>
    <input type="range" id="zT" min="0" max="40" value="5" oninput="onZone()">
    <span class="row-value" id="zTv">5%</span>
  </div>
  <div class="row">
    <span class="row-label">Снизу</span>
    <input type="range" id="zB" min="0" max="40" value="5" oninput="onZone()">
    <span class="row-value" id="zBv">5%</span>
  </div>
</div>

<!-- ТОЧНАЯ ПОЗИЦИЯ -->
<div class="section">
  <div class="section-title">Точная позиция</div>
  <div class="row">
    <span class="row-label">По вертикали</span>
    <input type="range" id="posY" min="0" max="100" value="88" oninput="onPosY()">
    <span class="row-value" id="posYv">88%</span>
  </div>
  <div class="row">
    <span class="row-label">По горизонтали</span>
    <input type="range" id="posX" min="0" max="100" value="50" oninput="onPosX()">
    <span class="row-value" id="posXv">50%</span>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn-reset" onclick="resetAll()">Сброс</button>
  <button class="btn-save" onclick="saveSettings()">✓ Сохранить</button>
</div>

<script>
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

var state = {
  posX: 50, posY: 88,
  fontSize: 22,
  fontWeight: 'normal',
  bgStyle: 'none',
  color: '#ffffff',
  maxWords: 5,
  zone: { left: 5, right: 5, top: 5, bottom: 5 },
  preset: 'bc',
  vidW: 1080,
  vidH: 1920
};

var COLORS = [
  '#ffffff', '#ffff00', '#00ff88',
  '#ff6b6b', '#4f9eff', '#ffb347',
  '#e879f9', '#000000'
];

var PRESETS = {
  tl: { posX: 10, posY: 8  },
  tc: { posX: 50, posY: 8  },
  tr: { posX: 90, posY: 8  },
  ml: { posX: 10, posY: 50 },
  mc: { posX: 50, posY: 50 },
  mr: { posX: 90, posY: 50 },
  bl: { posX: 10, posY: 88 },
  bc: { posX: 50, posY: 88 },
  br: { posX: 90, posY: 88 }
};

// --- Размер превью ---
function updatePreviewSize() {
  var w = parseInt(document.getElementById('vidW').value) || 1080;
  var h = parseInt(document.getElementById('vidH').value) || 1920;
  state.vidW = w;
  state.vidH = h;
  var inner = document.getElementById('previewInner');
  var wrap = document.getElementById('previewWrap');
  var maxW = wrap.offsetWidth;
  var ratio = h / w;
  var previewH = Math.min(maxW * ratio, 380);
  var previewW = previewH / ratio;
  inner.style.width = previewW + 'px';
  inner.style.height = previewH + 'px';
  inner.style.margin = '0 auto';
  renderPreview();
}

document.getElementById('vidW').addEventListener('input', updatePreviewSize);
document.getElementById('vidH').addEventListener('input', updatePreviewSize);

// --- Рендер ---
function renderPreview() {
  var inner = document.getElementById('previewInner');
  var pw = inner.offsetWidth;
  var ph = inner.offsetHeight;
  if (!pw || !ph) return;

  var z = state.zone;
  var zl = pw * z.left / 100;
  var zt = ph * z.top / 100;
  var zw = pw * (1 - z.left / 100 - z.right / 100);
  var zh = ph * (1 - z.top / 100 - z.bottom / 100);

  var sz = document.getElementById('safe-zone');
  sz.style.left   = zl + 'px';
  sz.style.top    = zt + 'px';
  sz.style.width  = zw + 'px';
  sz.style.height = zh + 'px';

  // Ручки
  var positions = {
    'h-tl': [zl,    zt],
    'h-tr': [zl+zw, zt],
    'h-bl': [zl,    zt+zh],
    'h-br': [zl+zw, zt+zh]
  };
  var keys = Object.keys(positions);
  for (var i = 0; i < keys.length; i++) {
    var id = keys[i];
    var el = document.getElementById(id);
    el.style.left = positions[id][0] + 'px';
    el.style.top  = positions[id][1] + 'px';
  }

  // Субтитр
  var subX = zl + zw * state.posX / 100;
  var subY = zt + zh * state.posY / 100;
  subY = Math.max(zt, Math.min(zt + zh - 30, subY));

  var sub = document.getElementById('sub-preview');
  sub.style.left  = zl + 'px';
  sub.style.width = zw + 'px';
  sub.style.top   = subY + 'px';

  var txt = document.getElementById('sub-text');
  txt.style.fontSize   = state.fontSize + 'px';
  txt.style.fontWeight = state.fontWeight === 'bold' ? '700' : '400';
  txt.style.color      = state.color;

  if (state.bgStyle === 'box') {
    txt.style.background   = 'rgba(0,0,0,0.65)';
    txt.style.padding      = '3px 8px';
    txt.style.borderRadius = '4px';
    txt.style.textShadow   = 'none';
  } else if (state.bgStyle === 'shadow') {
    txt.style.background   = 'none';
    txt.style.padding      = '0';
    txt.style.borderRadius = '0';
    txt.style.textShadow   = '0 0 8px #000, 0 0 16px #000';
  } else {
    txt.style.background   = 'none';
    txt.style.padding      = '0';
    txt.style.borderRadius = '0';
    txt.style.textShadow   = '1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000';
  }
}

// --- Перетаскивание ручек ---
function setupDrag() {
  var handles = ['tl', 'tr', 'bl', 'br'];
  for (var i = 0; i < handles.length; i++) {
    (function(hid) {
      var el = document.getElementById('h-' + hid);
      var dragging = false;
      var startX, startY, startZone;

      function start(cx, cy) {
        dragging = true;
        startX = cx; startY = cy;
        startZone = {
          left:   state.zone.left,
          right:  state.zone.right,
          top:    state.zone.top,
          bottom: state.zone.bottom
        };
      }

      function move(cx, cy) {
        if (!dragging) return;
        var inner = document.getElementById('previewInner');
        var pw = inner.offsetWidth;
        var ph = inner.offsetHeight;
        var dx = (cx - startX) / pw * 100;
        var dy = (cy - startY) / ph * 100;

        if (hid === 'tl') {
          state.zone.left = Math.max(0, Math.min(40, startZone.left + dx));
          state.zone.top  = Math.max(0, Math.min(40, startZone.top  + dy));
        } else if (hid === 'tr') {
          state.zone.right = Math.max(0, Math.min(40, startZone.right - dx));
          state.zone.top   = Math.max(0, Math.min(40, startZone.top   + dy));
        } else if (hid === 'bl') {
          state.zone.left   = Math.max(0, Math.min(40, startZone.left   + dx));
          state.zone.bottom = Math.max(0, Math.min(40, startZone.bottom - dy));
        } else {
          state.zone.right  = Math.max(0, Math.min(40, startZone.right  - dx));
          state.zone.bottom = Math.max(0, Math.min(40, startZone.bottom - dy));
        }
        syncZoneSliders();
        renderPreview();
      }

      function end() { dragging = false; }

      el.addEventListener('mousedown',  function(e) { e.preventDefault(); start(e.clientX, e.clientY); });
      el.addEventListener('touchstart', function(e) { e.preventDefault(); start(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
      window.addEventListener('mousemove',  function(e) { move(e.clientX, e.clientY); });
      window.addEventListener('touchmove',  function(e) { if (dragging) { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
      window.addEventListener('mouseup',    end);
      window.addEventListener('touchend',   end);
    })(handles[i]);
  }
}

function syncZoneSliders() {
  document.getElementById('zL').value = Math.round(state.zone.left);
  document.getElementById('zR').value = Math.round(state.zone.right);
  document.getElementById('zT').value = Math.round(state.zone.top);
  document.getElementById('zB').value = Math.round(state.zone.bottom);
  document.getElementById('zLv').textContent = Math.round(state.zone.left)   + '%';
  document.getElementById('zRv').textContent = Math.round(state.zone.right)  + '%';
  document.getElementById('zTv').textContent = Math.round(state.zone.top)    + '%';
  document.getElementById('zBv').textContent = Math.round(state.zone.bottom) + '%';
}

// --- Обработчики ---
function onFontSize() {
  state.fontSize = parseInt(document.getElementById('fontSize').value);
  document.getElementById('fontSizeVal').textContent = state.fontSize + 'px';
  renderPreview();
}

function onMaxWords() {
  state.maxWords = parseInt(document.getElementById('maxWords').value);
  document.getElementById('maxWordsVal').textContent = state.maxWords;
}

function onPosY() {
  state.posY = parseInt(document.getElementById('posY').value);
  document.getElementById('posYv').textContent = state.posY + '%';
  renderPreview();
}

function onPosX() {
  state.posX = parseInt(document.getElementById('posX').value);
  document.getElementById('posXv').textContent = state.posX + '%';
  renderPreview();
}

function onZone() {
  state.zone.left   = parseInt(document.getElementById('zL').value);
  state.zone.right  = parseInt(document.getElementById('zR').value);
  state.zone.top    = parseInt(document.getElementById('zT').value);
  state.zone.bottom = parseInt(document.getElementById('zB').value);
  document.getElementById('zLv').textContent = state.zone.left   + '%';
  document.getElementById('zRv').textContent = state.zone.right  + '%';
  document.getElementById('zTv').textContent = state.zone.top    + '%';
  document.getElementById('zBv').textContent = state.zone.bottom + '%';
  renderPreview();
}

function setFW(w) {
  state.fontWeight = w;
  document.getElementById('fw-normal').className = w === 'normal' ? 'active' : '';
  document.getElementById('fw-bold').className   = w === 'bold'   ? 'active' : '';
  renderPreview();
}

function setBG(v) {
  state.bgStyle = v;
  document.getElementById('bg-none').className   = v === 'none'   ? 'active' : '';
  document.getElementById('bg-shadow').className = v === 'shadow' ? 'active' : '';
  document.getElementById('bg-box').className    = v === 'box'    ? 'active' : '';
  renderPreview();
}

function setPreset(id) {
  var p = PRESETS[id];
  if (!p) return;
  state.posX = p.posX;
  state.posY = p.posY;
  state.preset = id;
  document.getElementById('posX').value = state.posX;
  document.getElementById('posY').value = state.posY;
  document.getElementById('posXv').textContent = state.posX + '%';
  document.getElementById('posYv').textContent = state.posY + '%';
  var pids = ['tl','tc','tr','ml','mc','mr','bl','bc','br'];
  for (var i = 0; i < pids.length; i++) {
    var btn = document.getElementById('pb-' + pids[i]);
    btn.className = 'pos-btn' + (pids[i] === id ? ' active' : '');
  }
  renderPreview();
}

function buildColors() {
  var row = document.getElementById('colorRow');
  row.innerHTML = '';
  for (var i = 0; i < COLORS.length; i++) {
    (function(c) {
      var s = document.createElement('div');
      s.className = 'color-swatch' + (c === state.color ? ' selected' : '');
      s.style.background = c;
      if (c === '#000000') s.style.border = '3px solid #444';
      s.onclick = function() {
        state.color = c;
        buildColors();
        renderPreview();
      };
      row.appendChild(s);
    })(COLORS[i]);
  }
}

function resetAll() {
  state.posX = 50; state.posY = 88;
  state.fontSize = 22; state.fontWeight = 'normal';
  state.bgStyle = 'none'; state.color = '#ffffff';
  state.maxWords = 5;
  state.zone = { left: 5, right: 5, top: 5, bottom: 5 };
  state.preset = 'bc';

  document.getElementById('fontSize').value = 22;
  document.getElementById('fontSizeVal').textContent = '22px';
  document.getElementById('maxWords').value = 5;
  document.getElementById('maxWordsVal').textContent = '5';
  document.getElementById('posX').value = 50;
  document.getElementById('posY').value = 88;
  document.getElementById('posXv').textContent = '50%';
  document.getElementById('posYv').textContent = '88%';

  setFW('normal');
  setBG('none');
  syncZoneSliders();
  buildColors();
  setPreset('bc');
}

function saveSettings() {
  var data = {
    posX:       state.posX,
    posY:       state.posY,
    fontSize:   state.fontSize,
    fontWeight: state.fontWeight,
    bgStyle:    state.bgStyle,
    color:      state.color,
    maxWords:   state.maxWords,
    zone:       state.zone,
    vidW:       state.vidW,
    vidH:       state.vidH
  };
  if (tg) {
    tg.sendData(JSON.stringify(data));
  } else {
    alert(JSON.stringify(data, null, 2));
  }
}

// --- Инициализация ---
buildColors();
setupDrag();
requestAnimationFrame(function() {
  updatePreviewSize();
});
</script>
