<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Настройки субтитров</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
  --border: #2e2e2e; --accent: #4f9eff; --green: #34c76f;
  --text: #f0f0f0; --text2: #888; --r: 12px;
}
body { background:var(--bg); color:var(--text); font-family:-apple-system,'Segoe UI',sans-serif; font-size:15px; padding:12px 12px 90px; }

/* SIZE ROW */
.size-row { display:flex; gap:8px; margin-bottom:12px; align-items:center; flex-wrap:wrap; }
.size-row label { font-size:12px; color:var(--text2); white-space:nowrap; }
.size-row input[type=number] {
  width:70px; background:var(--surface); border:1.5px solid var(--border);
  border-radius:8px; color:var(--text); font-size:14px; font-weight:600;
  padding:7px 8px; outline:none; -moz-appearance:textfield; text-align:center;
}
.size-row input[type=number]::-webkit-outer-spin-button,
.size-row input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
.size-row input[type=number]:focus { border-color:var(--accent); }
.size-sep { color:var(--text2); font-size:20px; line-height:1; }
.size-presets { display:flex; gap:6px; margin-left:auto; }
.size-preset-btn {
  background:var(--surface2); border:1.5px solid var(--border);
  color:var(--text2); font-size:11px; font-weight:600;
  padding:5px 8px; border-radius:6px; cursor:pointer; white-space:nowrap;
}
.size-preset-btn:hover { border-color:var(--accent); color:var(--text); }

/* PREVIEW */
.preview-outer {
  display:flex; justify-content:center;
  margin-bottom:14px;
  background:#111; border-radius:var(--r); overflow:hidden;
}
#previewBox {
  position:relative; overflow:hidden; flex-shrink:0;
  background:linear-gradient(160deg,#1a1a2e,#0f3460);
}
.preview-label {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:11px; color:#333; text-transform:uppercase; letter-spacing:.06em;
  pointer-events:none; user-select:none;
}

/* safe zone */
#safeZone {
  position:absolute;
  border:1.5px dashed rgba(79,158,255,.55);
  background:rgba(79,158,255,.04);
  pointer-events:none;
}
/* subtitle text */
#subText {
  position:absolute;
  pointer-events:none;
  white-space:pre-wrap;
  word-break:break-word;
  line-height:1.25;
  /* transform-origin set by JS */
}
/* drag handles */
.hdl {
  position:absolute; width:14px; height:14px;
  background:var(--accent); border:2.5px solid #fff;
  border-radius:50%; transform:translate(-50%,-50%);
  z-index:20; touch-action:none; cursor:grab;
  transition:transform .1s;
}
.hdl:active { transform:translate(-50%,-50%) scale(1.35); }

/* SECTIONS */
.section { background:var(--surface); border-radius:var(--r); overflow:hidden; margin-bottom:10px; border:1px solid var(--border); }
.sec-title { font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text2); padding:10px 14px 6px; }
.row { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-top:1px solid var(--border); gap:12px; }
.row:first-of-type { border-top:none; }
.rl { font-size:14px; color:var(--text); flex-shrink:0; min-width:95px; }
.rv { font-size:13px; color:var(--accent); font-weight:700; min-width:38px; text-align:right; flex-shrink:0; }

input[type=range] {
  -webkit-appearance:none; flex:1; height:4px; border-radius:2px;
  background:var(--border); outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
  background:var(--accent); border:3px solid var(--surface); box-shadow:0 0 0 2px var(--accent);
}

.tog { display:flex; background:var(--surface2); border-radius:8px; padding:3px; flex-shrink:0; }
.tog button {
  border:none; background:none; color:var(--text2); font-size:11px; font-weight:600;
  padding:5px 9px; border-radius:6px; cursor:pointer; white-space:nowrap;
}
.tog button.on { background:var(--accent); color:#fff; }

.colors { display:flex; gap:8px; flex-wrap:wrap; padding:10px 14px; border-top:1px solid var(--border); }
.csw { width:30px; height:30px; border-radius:50%; border:3px solid transparent; cursor:pointer; transition:transform .12s; }
.csw:hover { transform:scale(1.1); }
.csw.sel { border-color:#fff; }

.pgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; padding:10px 14px; border-top:1px solid var(--border); }
.pb {
  border:1.5px solid var(--border); background:var(--surface2); color:var(--text2);
  border-radius:8px; padding:7px 3px; font-size:10px; cursor:pointer; text-align:center; transition:all .12s;
}
.pb .ic { font-size:15px; display:block; margin-bottom:1px; }
.pb.on { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }

/* BOTTOM BAR */
.bot {
  position:fixed; bottom:0; left:0; right:0;
  padding:10px 12px; background:var(--bg);
  border-top:1px solid var(--border);
  display:flex; gap:8px; z-index:100;
}
.btn-rst {
  background:var(--surface2); border:1.5px solid var(--border); color:var(--text2);
  border-radius:10px; padding:12px 14px; font-size:14px; cursor:pointer; font-weight:600;
}
.btn-sav {
  flex:1; border:none; color:#fff; border-radius:10px; padding:12px;
  font-size:15px; font-weight:700; cursor:pointer;
  background:var(--accent); transition:background .3s;
}
.btn-sav.saved { background:var(--green); }
</style>
</head>
<body>

<!-- РАЗМЕР ВИДЕО -->
<div class="size-row">
  <label>Ш</label>
  <input type="number" id="vidW" value="1080" min="100" max="7680">
  <span class="size-sep">×</span>
  <label>В</label>
  <input type="number" id="vidH" value="1920" min="100" max="7680">
  <div class="size-presets">
    <button class="size-preset-btn" onclick="setSize(1080,1920)">Рилс</button>
    <button class="size-preset-btn" onclick="setSize(1920,1080)">16:9</button>
    <button class="size-preset-btn" onclick="setSize(1080,1080)">1:1</button>
  </div>
</div>

<!-- PREVIEW -->
<div class="preview-outer">
  <div id="previewBox">
    <div class="preview-label">превью</div>
    <div id="safeZone">
      <div class="hdl" id="hTL"></div>
      <div class="hdl" id="hTR"></div>
      <div class="hdl" id="hBL"></div>
      <div class="hdl" id="hBR"></div>
    </div>
    <div id="subText">Пример субтитра</div>
  </div>
</div>

<!-- ПОЗИЦИЯ -->
<div class="section">
  <div class="sec-title">Позиция</div>
  <div class="pgrid">
    <button class="pb" id="pb-tl" onclick="setPreset('tl')"><span class="ic">↖</span>Верх L</button>
    <button class="pb" id="pb-tc" onclick="setPreset('tc')"><span class="ic">↑</span>Верх C</button>
    <button class="pb" id="pb-tr" onclick="setPreset('tr')"><span class="ic">↗</span>Верх R</button>
    <button class="pb" id="pb-ml" onclick="setPreset('ml')"><span class="ic">←</span>Середина</button>
    <button class="pb" id="pb-mc" onclick="setPreset('mc')"><span class="ic">·</span>Центр</button>
    <button class="pb" id="pb-mr" onclick="setPreset('mr')"><span class="ic">→</span>Середина</button>
    <button class="pb" id="pb-bl" onclick="setPreset('bl')"><span class="ic">↙</span>Низ L</button>
    <button class="pb on" id="pb-bc" onclick="setPreset('bc')"><span class="ic">↓</span>Низ C</button>
    <button class="pb" id="pb-br" onclick="setPreset('br')"><span class="ic">↘</span>Низ R</button>
  </div>
  <div class="row">
    <span class="rl">По вертикали</span>
    <input type="range" id="posY" min="0" max="100" value="88" oninput="onPosY()">
    <span class="rv" id="posYv">88%</span>
  </div>
  <div class="row">
    <span class="rl">По горизонтали</span>
    <input type="range" id="posX" min="0" max="100" value="50" oninput="onPosX()">
    <span class="rv" id="posXv">50%</span>
  </div>
</div>

<!-- СТИЛЬ -->
<div class="section">
  <div class="sec-title">Размер и стиль</div>
  <div class="row">
    <span class="rl">Размер шрифта</span>
    <input type="range" id="fontSize" min="10" max="80" value="22" oninput="onFontSize()">
    <span class="rv" id="fontSizeV">22px</span>
  </div>
  <div class="row">
    <span class="rl">Жирность</span>
    <div class="tog">
      <button id="fw0" class="on" onclick="setFW('normal')">Обычный</button>
      <button id="fw1" onclick="setFW('bold')">Жирный</button>
    </div>
  </div>
  <div class="row">
    <span class="rl">Фон текста</span>
    <div class="tog">
      <button id="bg0" class="on" onclick="setBG('none')">Нет</button>
      <button id="bg1" onclick="setBG('shadow')">Тень</button>
      <button id="bg2" onclick="setBG('box')">Плашка</button>
    </div>
  </div>
  <div class="row">
    <span class="rl">Слов в строке</span>
    <input type="range" id="maxWords" min="2" max="8" value="5" step="1" oninput="onMaxWords()">
    <span class="rv" id="maxWordsV">5</span>
  </div>
</div>

<!-- ЦВЕТ -->
<div class="section">
  <div class="sec-title">Цвет текста</div>
  <div class="colors" id="colorRow"></div>
</div>

<!-- ЗОНА -->
<div class="section">
  <div class="sec-title">Безопасная зона</div>
  <div class="row"><span class="rl">Слева</span><input type="range" id="zL" min="0" max="45" value="5" oninput="onZone()"><span class="rv" id="zLv">5%</span></div>
  <div class="row"><span class="rl">Справа</span><input type="range" id="zR" min="0" max="45" value="5" oninput="onZone()"><span class="rv" id="zRv">5%</span></div>
  <div class="row"><span class="rl">Сверху</span><input type="range" id="zT" min="0" max="45" value="5" oninput="onZone()"><span class="rv" id="zTv">5%</span></div>
  <div class="row"><span class="rl">Снизу</span><input type="range" id="zB" min="0" max="45" value="5" oninput="onZone()"><span class="rv" id="zBv">5%</span></div>
</div>

<div class="bot">
  <button class="btn-rst" onclick="resetAll()">Сброс</button>
  <button class="btn-sav" id="btnSave" onclick="saveSettings()">✓ Сохранить</button>
</div>

<script>
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Состояние ──────────────────────────────────────────────
var S = {
  vidW:1080, vidH:1920,
  posX:50, posY:88,
  fontSize:22, fontWeight:'normal', bgStyle:'none',
  color:'#ffffff', maxWords:5,
  zone:{ left:5, right:5, top:5, bottom:5 }
};

var PRESETS = {
  tl:{x:10,y:8}, tc:{x:50,y:8},  tr:{x:90,y:8},
  ml:{x:10,y:50},mc:{x:50,y:50}, mr:{x:90,y:50},
  bl:{x:10,y:90},bc:{x:50,y:88}, br:{x:90,y:90}
};

var COLORS = ['#ffffff','#ffff00','#00ff88','#ff6b6b','#4f9eff','#ffb347','#e879f9','#000000'];

// ── Размер превью ───────────────────────────────────────────
// Максимальная высота превью в px
var MAX_PH = 320;
var MAX_PW = 0; // вычисляется из контейнера

function getScale() {
  // Коэффициент: сколько пикселей экрана на 1 пиксель видео
  var box = document.getElementById('previewBox');
  return box.offsetWidth / S.vidW;
}

function updatePreviewSize() {
  S.vidW = parseInt(document.getElementById('vidW').value) || 1080;
  S.vidH = parseInt(document.getElementById('vidH').value) || 1920;

  var outer = document.querySelector('.preview-outer');
  MAX_PW = outer.offsetWidth - 0; // полная ширина

  var ratio = S.vidH / S.vidW;
  var pw, ph;

  if (ratio >= 1) {
    // Вертикальное видео — ограничиваем высоту
    ph = Math.min(MAX_PH, MAX_PW * ratio);
    pw = ph / ratio;
  } else {
    // Горизонтальное — ограничиваем ширину
    pw = Math.min(MAX_PW, MAX_PH / ratio);
    ph = pw * ratio;
  }

  var box = document.getElementById('previewBox');
  box.style.width  = pw + 'px';
  box.style.height = ph + 'px';

  render();
}

function setSize(w, h) {
  document.getElementById('vidW').value = w;
  document.getElementById('vidH').value = h;
  updatePreviewSize();
}

// ── Рендер превью ───────────────────────────────────────────
function render() {
  var box = document.getElementById('previewBox');
  var pw = box.offsetWidth;
  var ph = box.offsetHeight;
  if (!pw || !ph) return;

  var scale = pw / S.vidW; // px экрана / px видео

  // Зона безопасности
  var z = S.zone;
  var zl = pw * z.left   / 100;
  var zt = ph * z.top    / 100;
  var zw = pw * (1 - z.left/100 - z.right/100);
  var zh = ph * (1 - z.top/100  - z.bottom/100);

  var sz = document.getElementById('safeZone');
  sz.style.left   = zl + 'px';
  sz.style.top    = zt + 'px';
  sz.style.width  = zw + 'px';
  sz.style.height = zh + 'px';

  // Ручки углов
  setHdl('hTL', zl,    zt);
  setHdl('hTR', zl+zw, zt);
  setHdl('hBL', zl,    zt+zh);
  setHdl('hBR', zl+zw, zt+zh);

  // Позиция текста внутри зоны
  var tx = zl + zw * S.posX / 100;
  var ty = zt + zh * S.posY / 100;

  // Размер шрифта масштабируется 1:1 с видео
  var scaledFont = Math.round(S.fontSize * scale);

  var el = document.getElementById('subText');
  el.style.fontSize   = scaledFont + 'px';
  el.style.fontWeight = S.fontWeight === 'bold' ? '700' : '400';
  el.style.color      = S.color;

  // Ширина текста = ширина зоны
  el.style.width     = zw + 'px';
  el.style.textAlign = 'center';

  // Позиционируем по центру точки ty
  el.style.left = zl + 'px';
  // Сначала сброс top чтобы offsetHeight посчитался правильно
  el.style.top = '0px';
  var th = el.offsetHeight;
  var finalY = ty - th / 2;
  // Не выходим за зону
  finalY = Math.max(zt, Math.min(zt + zh - th, finalY));
  el.style.top = finalY + 'px';

  // Стиль фона
  if (S.bgStyle === 'box') {
    el.style.background   = 'rgba(0,0,0,0.65)';
    el.style.padding      = Math.round(3*scale) + 'px ' + Math.round(8*scale) + 'px';
    el.style.borderRadius = Math.round(4*scale) + 'px';
    el.style.textShadow   = 'none';
  } else if (S.bgStyle === 'shadow') {
    el.style.background   = 'none';
    el.style.padding      = '0';
    el.style.borderRadius = '0';
    el.style.textShadow   = '0 0 ' + Math.round(8*scale) + 'px #000, 0 0 ' + Math.round(16*scale) + 'px #000';
  } else {
    el.style.background   = 'none';
    el.style.padding      = '0';
    el.style.borderRadius = '0';
    var o = Math.max(1, Math.round(scale));
    el.style.textShadow   = o+'px '+o+'px 0 #000, -'+o+'px '+o+'px 0 #000, '+o+'px -'+o+'px 0 #000, -'+o+'px -'+o+'px 0 #000';
  }
}

function setHdl(id, x, y) {
  var el = document.getElementById(id);
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
}

// ── Drag handles ────────────────────────────────────────────
function setupDrag() {
  var pairs = [
    { id:'hTL', onMove: function(dx,dy,sz0) { S.zone.left=clamp(sz0.left+dx,0,45); S.zone.top=clamp(sz0.top+dy,0,45); } },
    { id:'hTR', onMove: function(dx,dy,sz0) { S.zone.right=clamp(sz0.right-dx,0,45); S.zone.top=clamp(sz0.top+dy,0,45); } },
    { id:'hBL', onMove: function(dx,dy,sz0) { S.zone.left=clamp(sz0.left+dx,0,45); S.zone.bottom=clamp(sz0.bottom-dy,0,45); } },
    { id:'hBR', onMove: function(dx,dy,sz0) { S.zone.right=clamp(sz0.right-dx,0,45); S.zone.bottom=clamp(sz0.bottom-dy,0,45); } }
  ];

  pairs.forEach(function(p) {
    var el = document.getElementById(p.id);
    var drag = false, sx, sy, sz0;

    function start(cx,cy) {
      drag=true; sx=cx; sy=cy;
      sz0={ left:S.zone.left, right:S.zone.right, top:S.zone.top, bottom:S.zone.bottom };
    }
    function move(cx,cy) {
      if (!drag) return;
      var box = document.getElementById('previewBox');
      var dx = (cx-sx)/box.offsetWidth*100;
      var dy = (cy-sy)/box.offsetHeight*100;
      p.onMove(dx,dy,sz0);
      syncZone();
      render();
    }
    function end() { drag=false; }

    el.addEventListener('mousedown',  function(e){ e.preventDefault(); start(e.clientX,e.clientY); });
    el.addEventListener('touchstart', function(e){ e.preventDefault(); start(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
    window.addEventListener('mousemove',  function(e){ move(e.clientX,e.clientY); });
    window.addEventListener('touchmove',  function(e){ if(drag){e.preventDefault();move(e.touches[0].clientX,e.touches[0].clientY);} },{passive:false});
    window.addEventListener('mouseup',  end);
    window.addEventListener('touchend', end);
  });
}

function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }

function syncZone() {
  ['L','R','T','B'].forEach(function(k) {
    var key = {L:'left',R:'right',T:'top',B:'bottom'}[k];
    document.getElementById('z'+k).value = Math.round(S.zone[key]);
    document.getElementById('z'+k+'v').textContent = Math.round(S.zone[key])+'%';
  });
}

// ── Обработчики контролов ───────────────────────────────────
function onFontSize() {
  S.fontSize = parseInt(document.getElementById('fontSize').value);
  document.getElementById('fontSizeV').textContent = S.fontSize+'px';
  render();
}
function onMaxWords() {
  S.maxWords = parseInt(document.getElementById('maxWords').value);
  document.getElementById('maxWordsV').textContent = S.maxWords;
}
function onPosY() {
  S.posY = parseInt(document.getElementById('posY').value);
  document.getElementById('posYv').textContent = S.posY+'%';
  clearPresetActive();
  render();
}
function onPosX() {
  S.posX = parseInt(document.getElementById('posX').value);
  document.getElementById('posXv').textContent = S.posX+'%';
  clearPresetActive();
  render();
}
function onZone() {
  S.zone.left   = parseInt(document.getElementById('zL').value);
  S.zone.right  = parseInt(document.getElementById('zR').value);
  S.zone.top    = parseInt(document.getElementById('zT').value);
  S.zone.bottom = parseInt(document.getElementById('zB').value);
  document.getElementById('zLv').textContent = S.zone.left+'%';
  document.getElementById('zRv').textContent = S.zone.right+'%';
  document.getElementById('zTv').textContent = S.zone.top+'%';
  document.getElementById('zBv').textContent = S.zone.bottom+'%';
  render();
}
function setFW(w) {
  S.fontWeight=w;
  document.getElementById('fw0').className = w==='normal'?'on':'';
  document.getElementById('fw1').className = w==='bold'?'on':'';
  render();
}
function setBG(v) {
  S.bgStyle=v;
  document.getElementById('bg0').className = v==='none'?'on':'';
  document.getElementById('bg1').className = v==='shadow'?'on':'';
  document.getElementById('bg2').className = v==='box'?'on':'';
  render();
}

var PRESET_IDS = ['tl','tc','tr','ml','mc','mr','bl','bc','br'];
function clearPresetActive() {
  PRESET_IDS.forEach(function(id){ document.getElementById('pb-'+id).className='pb'; });
}
function setPreset(id) {
  var p = PRESETS[id]; if(!p) return;
  S.posX=p.x; S.posY=p.y;
  document.getElementById('posX').value=S.posX;
  document.getElementById('posY').value=S.posY;
  document.getElementById('posXv').textContent=S.posX+'%';
  document.getElementById('posYv').textContent=S.posY+'%';
  clearPresetActive();
  document.getElementById('pb-'+id).className='pb on';
  render();
}

function buildColors() {
  var row=document.getElementById('colorRow');
  row.innerHTML='';
  COLORS.forEach(function(c){
    var el=document.createElement('div');
    el.className='csw'+(c===S.color?' sel':'');
    el.style.background=c;
    if(c==='#000000') el.style.border='3px solid #555';
    el.onclick=function(){ S.color=c; buildColors(); render(); };
    row.appendChild(el);
  });
}

// ── Сброс ───────────────────────────────────────────────────
function resetAll() {
  S.vidW=1080; S.vidH=1920;
  S.posX=50; S.posY=88;
  S.fontSize=22; S.fontWeight='normal'; S.bgStyle='none';
  S.color='#ffffff'; S.maxWords=5;
  S.zone={left:5,right:5,top:5,bottom:5};

  document.getElementById('vidW').value=1080;
  document.getElementById('vidH').value=1920;
  document.getElementById('fontSize').value=22;
  document.getElementById('fontSizeV').textContent='22px';
  document.getElementById('maxWords').value=5;
  document.getElementById('maxWordsV').textContent='5';
  document.getElementById('posX').value=50;
  document.getElementById('posY').value=88;
  document.getElementById('posXv').textContent='50%';
  document.getElementById('posYv').textContent='88%';

  setFW('normal'); setBG('none'); syncZone(); buildColors(); setPreset('bc');
  updatePreviewSize();

  var btn=document.getElementById('btnSave');
  btn.className='btn-sav'; btn.textContent='✓ Сохранить';
}

// ── Сохранение ──────────────────────────────────────────────
function saveSettings() {
  var data = {
    posX:S.posX, posY:S.posY,
    fontSize:S.fontSize, fontWeight:S.fontWeight,
    bgStyle:S.bgStyle, color:S.color,
    maxWords:S.maxWords, zone:S.zone,
    vidW:S.vidW, vidH:S.vidH
  };

  var btn = document.getElementById('btnSave');
  btn.className = 'btn-sav saved';
  btn.textContent = '✓ Сохранено!';

  setTimeout(function(){
    btn.className='btn-sav';
    btn.textContent='✓ Сохранить';
  }, 2500);

  if (tg) {
    tg.sendData(JSON.stringify(data));
  } else {
    console.log(JSON.stringify(data,null,2));
  }
}

// ── Инициализация ───────────────────────────────────────────
buildColors();
setupDrag();
requestAnimationFrame(function(){
  updatePreviewSize();
});
window.addEventListener('resize', updatePreviewSize);
</script>
